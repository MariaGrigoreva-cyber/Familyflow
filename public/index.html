<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#C15B3D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FamilyFlow" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>FamilyFlow</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { overflow-x: hidden; max-width: 100%; }
      body { font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
             background: var(--c-bg); -webkit-tap-highlight-color: transparent; }
      #root { min-height: 100dvh; }
      /* Палитра «Тёплый гроссбух» как CSS-переменные — светлая по умолчанию, тёмная по системной
         теме (пока пользователь не переключил вручную) и по явному data-theme со страницы. */
      :root, :root[data-theme="light"] {
        --c-bg:#FCFBF8; --c-surface:#FFFFFF;
        --c-border:#EAE4DA; --c-border-s:#D8CFC2;
        --c-text:#1C1916; --c-text2:#6B6156; --c-muted:#A39A8D; --c-muted2:#8B8175; --c-faint:#C9BFB0;
        --c-track:#EFE9DF; --c-cream:#F5F0E8;
        --c-orange:oklch(0.62 0.13 40); --c-orange-d:oklch(0.5 0.12 40); --c-orange-l:oklch(0.96 0.02 40); --c-orange-b:oklch(0.9 0.05 40);
        --c-green:oklch(0.55 0.12 150); --c-green-d:oklch(0.45 0.1 150); --c-green-l:oklch(0.96 0.02 150); --c-green-b:oklch(0.85 0.06 150);
        --c-red:oklch(0.5 0.13 30); --c-red-l:oklch(0.96 0.02 30); --c-red-b:oklch(0.9 0.05 30);
        --c-yellow:oklch(0.5 0.11 85); --c-yellow-l:oklch(0.96 0.02 85); --c-yellow-b:oklch(0.9 0.05 85);
        --c-blue:oklch(0.65 0.08 250); --c-blue-l:oklch(0.95 0.02 250); --c-blue-b:oklch(0.85 0.05 250);
        --c-purple:oklch(0.6 0.1 300);
      }
      :root[data-theme="dark"] {
        --c-bg:oklch(0.19 0.012 40); --c-surface:oklch(0.235 0.014 40);
        --c-border:oklch(0.32 0.014 40); --c-border-s:oklch(0.38 0.016 40);
        --c-text:oklch(0.94 0.006 40); --c-text2:oklch(0.74 0.012 40); --c-muted:oklch(0.56 0.012 40); --c-muted2:oklch(0.62 0.012 40); --c-faint:oklch(0.42 0.012 40);
        --c-track:oklch(0.27 0.014 40); --c-cream:oklch(0.25 0.014 40);
        --c-orange:oklch(0.68 0.14 40); --c-orange-d:oklch(0.82 0.1 40); --c-orange-l:oklch(0.28 0.06 40); --c-orange-b:oklch(0.42 0.09 40);
        --c-green:oklch(0.62 0.13 150); --c-green-d:oklch(0.82 0.1 150); --c-green-l:oklch(0.26 0.05 150); --c-green-b:oklch(0.4 0.08 150);
        --c-red:oklch(0.62 0.15 30); --c-red-l:oklch(0.26 0.05 30); --c-red-b:oklch(0.4 0.09 30);
        --c-yellow:oklch(0.72 0.13 85); --c-yellow-l:oklch(0.26 0.05 85); --c-yellow-b:oklch(0.42 0.08 85);
        --c-blue:oklch(0.72 0.09 250); --c-blue-l:oklch(0.26 0.05 250); --c-blue-b:oklch(0.42 0.08 250);
        --c-purple:oklch(0.7 0.11 300);
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]) {
          --c-bg:oklch(0.19 0.012 40); --c-surface:oklch(0.235 0.014 40);
          --c-border:oklch(0.32 0.014 40); --c-border-s:oklch(0.38 0.016 40);
          --c-text:oklch(0.94 0.006 40); --c-text2:oklch(0.74 0.012 40); --c-muted:oklch(0.56 0.012 40); --c-muted2:oklch(0.62 0.012 40); --c-faint:oklch(0.42 0.012 40);
          --c-track:oklch(0.27 0.014 40); --c-cream:oklch(0.25 0.014 40);
          --c-orange:oklch(0.68 0.14 40); --c-orange-d:oklch(0.82 0.1 40); --c-orange-l:oklch(0.28 0.06 40); --c-orange-b:oklch(0.42 0.09 40);
          --c-green:oklch(0.62 0.13 150); --c-green-d:oklch(0.82 0.1 150); --c-green-l:oklch(0.26 0.05 150); --c-green-b:oklch(0.4 0.08 150);
          --c-red:oklch(0.62 0.15 30); --c-red-l:oklch(0.26 0.05 30); --c-red-b:oklch(0.4 0.09 30);
          --c-yellow:oklch(0.72 0.13 85); --c-yellow-l:oklch(0.26 0.05 85); --c-yellow-b:oklch(0.42 0.08 85);
          --c-blue:oklch(0.72 0.09 250); --c-blue-l:oklch(0.26 0.05 250); --c-blue-b:oklch(0.42 0.08 250);
          --c-purple:oklch(0.7 0.11 300);
        }
      }
      /* Разряды в цифрах (моно-шрифт): word-spacing сужает именно пробел-разделитель,
         не трогая расстояние между самими цифрами — надёжно работает во всех движках. */
      [style*="IBM Plex Mono"] { word-spacing: -0.3em; }
      /* Нативные поля ввода по умолчанию у браузера белые independent от темы — страховка
         на случай инлайн-стиля без явного фона/цвета текста. Конкретный inline-style всё
         равно перекроет это, так что конфликтов с уже оформленными полями нет. */
      input, textarea, select {
        background: var(--c-surface);
        color: var(--c-text);
      }
      /* Видимый фокус для клавиатурной навигации — многие поля отключают outline инлайн-стилем,
         !important здесь оправдан: это единственный способ восстановить фокус-кольцо поверх них. */
      input:focus-visible, textarea:focus-visible, button:focus-visible, [tabindex]:focus-visible {
        outline: 2px solid #C15B3D !important;
        outline-offset: 2px;
      }
      @keyframes ffSplashBar { 0% { margin-left: -40%; } 100% { margin-left: 100%; } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Статичная заглушка: рисуется до загрузки и запуска JS, чтобы вместо белого
           экрана (особенно заметно при запуске PWA с домашнего экрана на iOS) сразу
           было видно фирменную заставку. React при монтировании заменит это содержимое
           реальным компонентом SplashScreen (App.jsx) — разметка и стили продублированы намеренно. -->
      <div style="height:100dvh;max-width:480px;margin:0 auto;width:100%;box-sizing:border-box;background:var(--c-orange);display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <div style="width:88px;height:88px;border-radius:26px;background:rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:44px;">🐷</div>
        <div style="font-size:32px;font-weight:600;letter-spacing:-.5px;color:#fff;margin-top:22px;">FamilyFlow</div>
        <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2.5px;color:rgba(255,255,255,.6);margin-top:8px;">ФИНАНСОВЫЙ ДИРЕКТОР СЕМЬИ</div>
        <div style="width:120px;height:3px;border-radius:2px;background:rgba(255,255,255,.25);margin-top:48px;overflow:hidden;">
          <div style="width:40%;height:3px;background:#fff;border-radius:2px;animation:ffSplashBar 1.1s ease-in-out infinite;"></div>
        </div>
      </div>
    </div>
  </body>
</html>
